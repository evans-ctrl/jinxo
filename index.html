<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jinxo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:white;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

.container{
width:min(95vw,500px);
}

h1{
text-align:center;
font-size:48px;
margin-bottom:15px;
font-weight:900;
letter-spacing:4px;
background:linear-gradient(90deg,#ffde59,#ff4fd8,#7d7cff,#ffde59);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:300%;}
}

.scoreboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.score{
background:#222;
border-radius:10px;
padding:12px;
text-align:center;
font-weight:bold;
}

.total{
grid-column:span 2;
font-size:24px;
background:#3a3a3a;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
aspect-ratio:1;
}

.cell{
position:relative;
background:#222;
border-radius:12px;
border:2px solid #555;
}

.icons{
position:absolute;
top:4px;
left:4px;
right:4px;
display:flex;
justify-content:space-between;
}

.icons button{
background:none;
border:none;
font-size:18px;
cursor:pointer;
}

.word{
width:100%;
height:100%;
padding-top:22px;
border:none;
background:transparent;
color:white;
text-align:center;
font-size:18px;
text-transform:uppercase;
outline:none;
}

.locked{
opacity:.35;
pointer-events:none;
}

.checked{
border-color:#00ff88;
}

.starred{
border-color:#ffd400;
}
</style>
</head>

<body>

<div class="container">

<h1>JINXO</h1>

<div class="scoreboard">
<div class="score">CH<br><span id="ch">0</span></div>
<div class="score">JX<br><span id="jx">0</span></div>
<div class="score">BG<br><span id="bg">0</span></div>
<div class="score total">TOTAL<br><span id="total">0</span></div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

const grid=document.getElementById("grid");
let state=JSON.parse(localStorage.getItem("jinxo"))||Array(9).fill(null).map(()=>({
word:"",
mark:null
}));

function save(){
localStorage.setItem("jinxo",JSON.stringify(state));
}

function updateScore(){

let checks=0;
let stars=0;

state.forEach(c=>{
if(c.mark==="check") checks++;
if(c.mark==="star") stars++;
});

let bg=0;

const lines=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8]
];

lines.forEach(line=>{
if(line.every(i=>state[i].mark!==null)){
bg++;
}
});

document.getElementById("ch").innerText=checks;
document.getElementById("jx").innerText=stars*2;
document.getElementById("bg").innerText=bg*2;
document.getElementById("total").innerText=checks+(stars*2)+(bg*2);

}

function render(){

grid.innerHTML="";

state.forEach((cell,index)=>{

const div=document.createElement("div");
div.className="cell";

if(cell.mark==="check") div.classList.add("checked");
if(cell.mark==="star") div.classList.add("starred");

const icons=document.createElement("div");
icons.className="icons";

const check=document.createElement("button");
check.innerHTML="✅";

const star=document.createElement("button");
star.innerHTML="⭐";

if(cell.mark){

check.classList.add("locked");
star.classList.add("locked");

}else{

check.onclick=()=>{

state[index].mark="check";
save();
render();

}

star.onclick=()=>{

state[index].mark="star";
save();
render();

}

}

icons.appendChild(check);
icons.appendChild(star);

const input=document.createElement("input");
input.className="word";
input.maxLength=12;
input.value=cell.word;

input.oninput=()=>{
input.value=input.value.replace(/\s/g,"");
state[index].word=input.value;
save();
};

div.appendChild(icons);
div.appendChild(input);

grid.appendChild(div);

});

updateScore();

}

render();

</script>

</body>
</html>
